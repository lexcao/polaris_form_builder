name: Sync Components

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-components
  cancel-in-progress: false

jobs:
  sync:
    name: Sync component data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set cache key date
        id: cache_date
        run: echo "day=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Restore sync cache
        uses: actions/cache@v4
        with:
          path: bin/dev/tmp
          key: sync-cache-${{ runner.os }}-${{ steps.cache_date.outputs.day }}

      - name: Sync components
        run: bin/command sync

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(sync): update Polaris component data"
          title: "chore(sync): daily Polaris component sync"
          body: |
            Automated daily sync for component metadata and examples.

            - Triggered by GitHub Actions schedule
            - Generated by `bin/command sync`
          branch: bot/daily-components-sync
          delete-branch: true
          add-paths: |
            data/components/*.json
